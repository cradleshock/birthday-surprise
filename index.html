<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
font-family:'Poppins',sans-serif;
text-align:center;
padding:20px;
overflow:hidden;
}

/* Animated Birthday Text */

h1{
font-family:'Pacifico',cursive;
font-size:clamp(2.5rem,6vw,4rem);
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.25);
animation:floatText 3s ease-in-out infinite;
margin-bottom:30px;
}

/* Floating animation */

@keyframes floatText{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Cake Image */

.cake{
width:min(90%,350px);
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
animation:fadeIn 1.5s ease;
}

/* Button */

button{
margin-top:40px;
padding:16px 40px;
font-size:1.1rem;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff4b6e,#ff758c);
color:white;
font-weight:600;
cursor:pointer;
transition:all .3s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

button:hover{
transform:scale(1.1);
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

/* Fade animation */

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* Confetti effect */

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
opacity:0.7;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(100vh) rotate(360deg);
}
}

</style>
</head>

<body>

<h1>Happy Birthday 🎉</h1>

<img src="cake.png" class="cake">

<a href="gift.html">
<button>🎁 Click to load your surprise</button>
</a>

<script>

/* Generate confetti */

for(let i=0;i<40;i++){

let confetti=document.createElement("div")
confetti.className="confetti"

confetti.style.left=Math.random()*100+"vw"
confetti.style.backgroundColor=
["#ff4b6e","#ffd93d","#6bcBef","#9d4edd"][Math.floor(Math.random()*4)]

confetti.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(confetti)

}

</script>

</body>
</html>
