<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Gift 🎁</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}

</style>
</head>

<body>

<video autoplay muted playsinline id="scare">
<source src="scare.mp4" type="video/mp4">
</video>
<script>
let v = document.getElementById("scare");

// Ensure it plays on page load after user click
window.addEventListener("load", () => {
    v.play().catch(() => {
        // fallback if autoplay still fails
        console.log("Autoplay failed, trying again after user gesture");
    });
    
    // Try fullscreen
    v.requestFullscreen().catch(()=>{});
});
</script>

</body>

</html>
